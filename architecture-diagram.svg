  <text x="450" y="142" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Aktiv Kəşfi</text>
  <text x="450" y="158" text-anchor="middle" fill="#64748b" font-size="9">Continuous Asset Discovery</text>

