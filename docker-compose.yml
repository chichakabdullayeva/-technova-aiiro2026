services:
  web:
    build: .
    container_name: kiber-dnt-web
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET:-kiber-dnt-secret-key-change-in-production}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: kiber-dnt-ollama
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  ollama_data:
